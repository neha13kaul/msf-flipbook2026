<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murty Science Fellowship — Interactive Brochure</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0f1e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Georgia, serif;
    padding: 24px 16px 32px;
  }

  h1.sr-only {
    position: absolute; width: 1px; height: 1px;
    overflow: hidden; clip: rect(0,0,0,0);
  }

  .brochure-title {
    color: #c9a84c;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
    opacity: 0.8;
  }

  .book-scene {
    perspective: 1800px;
    perspective-origin: center center;
    width: min(820px, 100%);
    position: relative;
  }

  .flipbook {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
  }

  .page {
    position: absolute;
    inset: 0;
    border-radius: 4px;
    overflow: hidden;
    backface-visibility: hidden;
    box-shadow: 4px 4px 24px rgba(0,0,0,0.5);
  }

  .page img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    user-select: none;
  }

  .page::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 12px;
    background: linear-gradient(to right, rgba(0,0,0,0.25), transparent);
    z-index: 2;
    pointer-events: none;
  }

  .click-prev, .click-next {
    position: absolute;
    top: 0;
    height: 100%;
    width: 18%;
    z-index: 200;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: background 0.2s;
  }

  .click-prev { left: 0; justify-content: flex-start; border-radius: 4px 0 0 4px; }
  .click-next { right: 0; justify-content: flex-end; border-radius: 0 4px 4px 0; }

  .click-prev:hover { background: linear-gradient(to right, rgba(201,168,76,0.12), transparent); }
  .click-next:hover { background: linear-gradient(to left, rgba(201,168,76,0.12), transparent); }

  .click-prev.disabled, .click-next.disabled { pointer-events: none; opacity: 0; }

  .arrow {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(201,168,76,0.85);
    display: flex; align-items: center; justify-content: center;
    margin: 0 12px;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.15s;
  }
  .click-prev:hover .arrow, .click-next:hover .arrow {
    background: rgba(201,168,76,1);
    transform: scale(1.08);
  }
  .arrow svg { width: 18px; height: 18px; }

  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
  }

  .btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.5);
    color: #c9a84c;
    border-radius: 4px;
    padding: 8px 20px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn:hover { background: rgba(201,168,76,0.12); border-color: #c9a84c; }
  .btn:disabled { opacity: 0.3; cursor: default; }

  .page-counter {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 1px;
    min-width: 60px;
    text-align: center;
  }

  .dots { display: flex; gap: 8px; align-items: center; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active { background: #c9a84c; transform: scale(1.4); }
  .dot:hover:not(.active) { background: rgba(255,255,255,0.4); }

  .hint {
    margin-top: 12px;
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 1px;
  }
</style>
</head>

];
const TOTAL = SLIDES.length;
let current = 0;
let animating = false;

const flipbook = document.getElementById('flipbook');
const dotsEl  = document.getElementById('dots');
const counter  = document.getElementById('counter');
const btnPrev  = document.getElementById('btnPrev');
const btnNext  = document.getElementById('btnNext');
const ctrlPrev = document.getElementById('ctrlPrev');
const ctrlNext = document.getElementById('ctrlNext');

// Build page elements — each starts flat (rotateY 0)
const pages = SLIDES.map((src, i) => {
  const div = document.createElement('div');
  div.className = 'page';
  const img = new Image();
  img.src = src;
  img.alt = 'Slide ' + (i + 1);
  img.draggable = false;
  div.appendChild(img);
  // All pages flat, stacked — current on top
  div.style.transform = 'rotateY(0deg)';
  div.style.transformOrigin = 'left center';
  div.style.zIndex = TOTAL - i;
  flipbook.appendChild(div);
  return div;
});

// Dots
SLIDES.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(d);
});

function refreshUI() {
  dotsEl.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
  counter.textContent = (current + 1) + ' / ' + TOTAL;
  const atStart = current === 0;
  const atEnd   = current === TOTAL - 1;
  btnPrev.classList.toggle('disabled', atStart);
  btnNext.classList.toggle('disabled', atEnd);
  ctrlPrev.disabled = atStart;
  ctrlNext.disabled = atEnd;
}

function animate(el, fromDeg, toDeg, onDone) {
  // Force start position without transition
  el.style.transition = 'none';
  el.style.transform = 'rotateY(' + fromDeg + 'deg)';
  // Trigger reflow so browser registers the start state
  void el.offsetWidth;
  // Now animate to end position
  el.style.transition = 'transform 0.6s cubic-bezier(0.77,0,0.175,1)';
  el.style.transform = 'rotateY(' + toDeg + 'deg)';
  setTimeout(() => {
    el.style.transition = 'none';
    if (onDone) onDone();
  }, 620);
}

function goTo(target) {
  if (target === current || animating || target < 0 || target >= TOTAL) return;
  animating = true;

  const dir = target > current ? 1 : -1;

  if (dir > 0) {
    // Going FORWARD: flip the current page from 0 → -180 (fold left)
    const pageToFlip = pages[current];
    // Keep it on top during animation
    pageToFlip.style.zIndex = TOTAL + 5;
    animate(pageToFlip, 0, -180, () => {
      // After flip: park it as "past" (left side, folded)
      pageToFlip.style.zIndex = current + 1;
      current = target;
      refreshUI();
      animating = false;
    });
  } else {
    // Going BACKWARD: flip the target page from -180 → 0 (unfold right)
    const pageToFlip = pages[target];
    // Bring it on top
    pageToFlip.style.zIndex = TOTAL + 5;
    animate(pageToFlip, -180, 0, () => {
      pageToFlip.style.zIndex = TOTAL - target;
      current = target;
      refreshUI();
      animating = false;
    });
  }

  refreshUI();
}

function go(dir) { goTo(current + dir); }

btnPrev.addEventListener('click', () => go(-1));
btnNext.addEventListener('click', () => go(1));
ctrlPrev.addEventListener('click', () => go(-1));
ctrlNext.addEventListener('click', () => go(1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

let touchStartX = 0;
flipbook.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive: true});
flipbook.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
}, {passive: true});

refreshUI();
</script>
